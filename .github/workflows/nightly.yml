name: Nightly Magisk Module

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'PicoClaw upstream nightly ref/tag, empty = nightly'
        required: false
        default: nightly
        type: string
  schedule:
    - cron: '23 15 * * *'

permissions:
  contents: write

jobs:
  nightly:
    name: Build upstream PicoClaw nightly as Magisk module
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4
        with:
          path: picoclaw-magisk-module

      - name: Resolve upstream nightly ref
        id: upstream
        env:
          INPUT_REF: ${{ inputs.upstream_ref }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-nightly}"
          tag_ref=$(git ls-remote --tags --refs https://github.com/sipeed/picoclaw.git "refs/tags/$ref" | awk 'NR==1 {print $2}')
          head_ref=$(git ls-remote --heads https://github.com/sipeed/picoclaw.git "refs/heads/$ref" | awk 'NR==1 {print $2}')
          if [ -n "$tag_ref" ]; then
            checkout_ref="$tag_ref"
          elif [ -n "$head_ref" ]; then
            checkout_ref="$head_ref"
          else
            echo "No upstream nightly ref found: $ref" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "Resolved $ref as $checkout_ref"

      - name: Checkout upstream PicoClaw
        uses: actions/checkout@v4
        with:
          repository: sipeed/picoclaw
          ref: ${{ steps.upstream.outputs.checkout_ref }}
          path: picoclaw
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve checked-out nightly version
        id: version
        working-directory: picoclaw
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          short_sha=$(git rev-parse --short=8 HEAD)
          upstream_tag=$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)
          if [ -n "$upstream_tag" ]; then
            version="$upstream_tag-nightly"
          else
            version="nightly-$(date -u +%Y%m%d)-$short_sha"
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved checked-out source at $sha as $version"

      - name: Overlay Magisk packaging
        run: cp -a picoclaw-magisk-module/packaging picoclaw/

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: picoclaw/go.mod
          cache-dependency-path: picoclaw/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: picoclaw/web/frontend/pnpm-lock.yaml

      - name: Build pure Magisk module
        working-directory: picoclaw
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.version.outputs.sha }}
          PICOCLAW_MODULE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          make build-android-arm64 VERSION="$VERSION" GIT_COMMIT="$SHA"
          make build-launcher-android-arm64 VERSION="$VERSION" GIT_COMMIT="$SHA"
          packaging/magisk/build-module.sh
          mkdir -p ../picoclaw-magisk-module/artifacts
          mv dist/magisk/picoclaw-magisk.zip "../picoclaw-magisk-module/artifacts/picoclaw-magisk-$VERSION.zip"

      - name: Apply Android DNS patch
        working-directory: picoclaw
        run: python3 ../picoclaw-magisk-module/patches/android_dns_fallback.py

      - name: Build Android-patched Magisk module
        working-directory: picoclaw
        env:
          VERSION: ${{ steps.version.outputs.version }}-android
          SHA: ${{ steps.version.outputs.sha }}
          PICOCLAW_MODULE_VERSION: ${{ steps.version.outputs.version }}-android
        run: |
          set -euo pipefail
          gofmt -w pkg/androidnet/dns.go cmd/picoclaw/main.go web/backend/main.go
          make build-android-arm64 VERSION="$VERSION" GIT_COMMIT="$SHA"
          make build-launcher-android-arm64 VERSION="$VERSION" GIT_COMMIT="$SHA"
          packaging/magisk/build-module.sh
          mkdir -p ../picoclaw-magisk-module/artifacts
          mv dist/magisk/picoclaw-magisk.zip "../picoclaw-magisk-module/artifacts/picoclaw-magisk-$VERSION.zip"

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          UPSTREAM_REF: ${{ steps.upstream.outputs.ref }}
          UPSTREAM_SHA: ${{ steps.version.outputs.sha }}
        run: |
          set -euo pipefail
          gh release delete "$VERSION" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            "picoclaw-magisk-module/artifacts/picoclaw-magisk-$VERSION.zip" \
            "picoclaw-magisk-module/artifacts/picoclaw-magisk-$VERSION-android.zip" \
            --title "PicoClaw Magisk Module $VERSION" \
            --notes "ARM64 Android Magisk modules built from upstream PicoClaw ref $UPSTREAM_REF at $UPSTREAM_SHA. Assets: pure upstream and Android DNS fallback patched."

      - name: Upload Magisk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-magisk-${{ steps.version.outputs.version }}-arm64
          path: picoclaw-magisk-module/artifacts/*.zip
